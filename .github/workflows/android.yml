name: Build Android APK

# 触发条件：main分支推送/PR时自动构建
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # 支持手动触发构建
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 配置JDK 17（适配Android 14+项目）
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. 给gradlew赋予执行权限
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. 执行Gradle打包（只打Release包，跳过测试，速度更快）
      - name: Build with Gradle (assembleRelease)
        run: ./gradlew assembleRelease --no-daemon --no-build-cache -x test

      # 5. 上传APK到GitHub Actions，可直接下载
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JohnnyAdBlock-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
